name: Test secrets, vars, environment, and gitHubToken inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MY_SECRET_VAR: "super-secret-value"
      MY_ENV_VAR: "my-env-value"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          apiToken: "fake-api-token-for-testing"
          command: "--version"
          wranglerVersion: "3.99.0"
          environment: "staging"
          gitHubToken: "fake-github-token"
          secrets: |
            MY_SECRET_VAR
          vars: |
            MY_ENV_VAR
        continue-on-error: true
      - name: Assert action ran with secrets, vars, environment, and gitHubToken
        env:
          OUTPUT: ${{ steps.action.outputs.command-output }}
          STDERR: ${{ steps.action.outputs.command-stderr }}
        run: |
          echo "command-output: $OUTPUT"
          echo "command-stderr: $STDERR"
          echo "PASS: action ran with secrets, vars, environment, and gitHubToken inputs"
