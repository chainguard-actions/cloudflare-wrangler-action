name: Test basic wrangler command
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          apiToken: "fake-api-token-for-testing"
          accountId: "fake-account-id-for-testing"
          command: "version"
          wranglerVersion: "3.99.0"
          packageManager: "npm"
        continue-on-error: true
      - name: Assert command-output or command-stderr is set
        env:
          OUTPUT: ${{ steps.action.outputs.command-output }}
          STDERR: ${{ steps.action.outputs.command-stderr }}
        run: |
          echo "command-output: $OUTPUT"
          echo "command-stderr: $STDERR"
          if [ -z "$OUTPUT" ] && [ -z "$STDERR" ]; then
            echo "FAIL: expected either command-output or command-stderr to be set"
            exit 1
          fi
          echo "PASS"
