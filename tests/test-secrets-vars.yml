name: Test secrets, vars, and gitHubToken inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MY_SECRET_VAR: "super-secret-value"
      MY_ENV_VAR: "my-env-value"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          apiToken: "fake-api-token-for-testing"
          accountId: "fake-account-id-for-testing"
          command: "version"
          gitHubToken: "fake-github-token-for-testing"
          secrets: |
            MY_SECRET_VAR
          vars: |
            MY_ENV_VAR
        continue-on-error: true
      - name: Assert action ran (output or stderr set)
        env:
          OUTPUT: ${{ steps.action.outputs.command-output }}
          STDERR: ${{ steps.action.outputs.command-stderr }}
        run: |
          echo "command-output: $OUTPUT"
          echo "command-stderr: $STDERR"
          if [ -z "$OUTPUT" ] && [ -z "$STDERR" ]; then
            echo "FAIL: expected either command-output or command-stderr to be set"
            exit 1
          fi
          echo "PASS"
