name: Test environment, vars, secrets, and gitHubToken inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MY_VAR: "my-var-value"
      MY_SECRET: "my-secret-value"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          apiToken: "fake-api-token"
          accountId: "fake-account-id"
          wranglerVersion: "3.99.0"
          command: "version"
          environment: "staging"
          gitHubToken: "fake-github-token"
          vars: |
            MY_VAR
          secrets: |
            MY_SECRET
        continue-on-error: true
      - name: Assert action ran with environment, vars, secrets, gitHubToken inputs
        env:
          OUTPUT: ${{ steps.action.outputs.command-output }}
          STDERR: ${{ steps.action.outputs.command-stderr }}
        run: |
          echo "command-output: $OUTPUT"
          echo "command-stderr: $STDERR"
          echo "PASS: action executed with environment, vars, secrets, and gitHubToken inputs"
